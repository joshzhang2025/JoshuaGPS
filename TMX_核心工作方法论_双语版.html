<title>TMX Core Work Methodology</title>
<style>
:root{
  --navy:#16386b;
  --navy-2:#1d4a8b;
  --bg:#eef2f7;
  --card:#ffffff;
  --line:#d7deeb;
  --text:#11233d;
  --muted:#5f7088;
  --blue:#2766d8;
  --blue2:#5569e8;
  --purple:#7c5ae8;
  --soft:#f5f8fc;
  --shadow:0 12px 30px rgba(18,35,61,.08);
}
*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{margin:0;font-family:"Microsoft YaHei","PingFang SC","Segoe UI",Arial,sans-serif;background:var(--bg);color:var(--text);}
a{color:inherit;text-decoration:none;}
.app{display:flex;min-height:100vh;}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:262px;background:linear-gradient(180deg,#16386b 0%, #173f7a 48%, #1b4682 100%);color:#fff;padding:20px 16px 18px;overflow:auto;}
.brand{display:flex;gap:12px;align-items:center;padding:4px 4px 18px;}
.logo{width:36px;height:36px;border-radius:12px;background:#fff;color:var(--blue);display:grid;place-items:center;font-weight:900;}
.brand h1{font-size:17px;line-height:1.2;margin:0 0 4px;}
.brand p{margin:0;font-size:12px;color:rgba(255,255,255,.78);}
.nav-caption{margin:6px 10px 10px;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.62);}
.nav-list{display:flex;flex-direction:column;gap:8px;}
.nav-item{display:flex;gap:12px;align-items:center;padding:13px 14px;border-radius:16px;color:rgba(255,255,255,.88);transition:.2s;}
.nav-item:hover{background:rgba(255,255,255,.08);}
.nav-item.active{background:#fff;color:var(--navy);font-weight:800;box-shadow:0 8px 18px rgba(0,0,0,.08);}
.nav-item .num{font-weight:900;min-width:18px;text-align:right;}
.nav-footer{margin-top:18px;padding:14px;border-radius:16px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);font-size:12px;line-height:1.6;color:rgba(255,255,255,.86);}
.main{margin-left:262px;width:calc(100% - 262px);padding:32px 26px 36px;}
.topbar{display:flex;justify-content:space-between;gap:18px;align-items:flex-start;}
.page-title h2{margin:0;font-size:22px;line-height:1.2;}
.page-title p{margin:8px 0 0;color:var(--muted);max-width:760px;}
.controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:flex-end;}
.btn{border:none;border-radius:999px;padding:12px 18px;font-size:14px;font-weight:800;cursor:pointer;background:#fff;color:var(--text);box-shadow:var(--shadow);}
.btn.primary{background:var(--blue);color:#fff;}
.btn.lang.active{border:2px solid rgba(39,102,216,.2);}
.hero{margin-top:24px;background:linear-gradient(120deg,#2766d8 0%, #4f69e7 36%, #6b59e8 72%, #8a65eb 100%);border-radius:28px;padding:28px 26px;color:#fff;position:relative;overflow:hidden;box-shadow:var(--shadow);}
.hero:after{content:"";position:absolute;right:-58px;top:-30px;width:210px;height:210px;border-radius:50%;background:rgba(255,255,255,.12);}
.hero h3{position:relative;margin:0;font-size:28px;line-height:1.2;}
.hero p{position:relative;margin:10px 0 0;color:rgba(255,255,255,.92);max-width:900px;}
.stat-row{display:flex;flex-wrap:wrap;gap:12px;margin-top:18px;position:relative;}
.stat{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.18);padding:10px 12px;border-radius:16px;min-width:120px;}
.stat strong{display:block;font-size:20px;line-height:1.1;}
.stat span{font-size:12px;color:rgba(255,255,255,.92);}
.search-panel{margin-top:22px;background:#fff;border:1px solid var(--line);border-radius:20px;padding:18px 18px 16px;box-shadow:var(--shadow);}
.search-row{display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
.search-box{flex:1;min-width:280px;display:flex;align-items:center;gap:12px;background:var(--soft);border:1px solid var(--line);border-radius:16px;padding:0 14px;}
.search-box input{width:100%;border:none;outline:none;background:transparent;padding:14px 0;font-size:14px;color:var(--text);}
.search-meta{font-size:13px;color:var(--muted);}
.section{margin-top:24px;scroll-margin-top:26px;}
.section-header{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin-bottom:12px;}
.section-header h3{margin:0;font-size:24px;line-height:1.2;}
.section-header p{margin:8px 0 0;color:var(--muted);max-width:920px;}
.card-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.info-card{background:#fff;border:1px solid var(--line);border-radius:22px;padding:18px;box-shadow:var(--shadow);}
.info-card .icon{width:42px;height:42px;border-radius:14px;background:#eef3ff;display:grid;place-items:center;font-size:22px;margin-bottom:12px;}
.info-card h4{margin:0 0 8px;font-size:18px;line-height:1.25;}
.info-card p{margin:0;color:var(--muted);line-height:1.7;font-size:14px;}
.flow{display:grid;grid-template-columns:repeat(7,1fr);gap:10px;margin-top:14px;}
.flow-item{background:#fff;border:1px solid var(--line);border-radius:18px;padding:14px 12px;position:relative;box-shadow:var(--shadow);}
.flow-item:not(:last-child)::after{content:"→";position:absolute;right:-11px;top:32px;color:var(--blue);font-weight:900;z-index:2;}
.flow-code{display:inline-block;padding:4px 8px;border-radius:999px;background:#edf3ff;color:var(--blue);font-weight:800;font-size:12px;}
.flow-item p{margin:10px 0 0;font-size:13px;line-height:1.55;color:var(--text);}
.method-list{display:flex;flex-direction:column;gap:14px;}
.method-row{display:grid;grid-template-columns:110px 1fr;gap:16px;background:#fff;border:1px solid var(--line);border-radius:22px;padding:16px 18px;box-shadow:var(--shadow);}
.method-meta .label{font-size:12px;color:var(--muted);display:block;margin-bottom:8px;}
.method-code{font-size:24px;font-weight:900;color:var(--blue);line-height:1.1;word-break:break-word;}
.method-type{margin-top:8px;display:inline-block;padding:6px 10px;border-radius:999px;background:#eef6ff;color:#2d5ec5;font-size:12px;font-weight:800;}
.method-title-row{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.method-title-group{display:flex;gap:12px;align-items:flex-start;min-width:0;}
.method-icon{width:44px;height:44px;border-radius:14px;background:#eef3ff;display:grid;place-items:center;font-size:22px;flex:none;}
.method-body h4{margin:0;font-size:22px;line-height:1.25;}
.method-subtitle{margin-top:6px;color:var(--muted);font-size:14px;}
.method-body p{margin:12px 0 0;font-size:14px;line-height:1.7;color:var(--text);}
.method-body p .k{font-weight:900;}
.method-body ul{margin:10px 0 0 18px;padding:0;color:var(--muted);}
.method-body li{margin:6px 0;line-height:1.65;}
.method-badge{padding:7px 10px;border-radius:999px;background:#f3f6fb;color:var(--muted);font-size:12px;font-weight:800;white-space:nowrap;}
.empty-state{display:none;background:#fff;border:1px dashed var(--line);border-radius:20px;padding:28px;text-align:center;color:var(--muted);box-shadow:var(--shadow);margin-top:24px;}
.footer-note{margin-top:22px;color:var(--muted);font-size:13px;line-height:1.7;padding:16px 2px;}
@media (max-width:1200px){.card-grid{grid-template-columns:repeat(2,1fr);} .flow{grid-template-columns:repeat(4,1fr);}}
@media (max-width:980px){.app{display:block;} .sidebar{position:static;width:100%;height:auto;} .main{margin-left:0;width:100%;} .card-grid{grid-template-columns:1fr;} .flow{grid-template-columns:repeat(2,1fr);} .method-row{grid-template-columns:1fr;} .topbar{flex-direction:column;align-items:flex-start;}}
@media (max-width:680px){.main{padding:22px 14px 28px;} .hero{padding:22px 18px;} .section-header h3{font-size:21px;} .method-body h4{font-size:19px;} .flow{grid-template-columns:1fr;} .flow-item:not(:last-child)::after{display:none;}}
</style>
</head>

      {code:'UPX', tag:'Foundation', icon:'🎓', titleZh:'UPX 学习方法', titleEn:'UPX Learning Method', fullEn:'Related UPX Courses / UPX Method', defZh:'UPX 是公司系统发现、筛选、购买、学习并转化外部优质课程和知识内容的方法，重点不只是“看课程”，而是把知识真正用于业务。', defEn:'UPX is the company method for systematically discovering, screening, purchasing, learning from, and converting high-quality external courses and knowledge content. The point is not only to watch courses, but to use the knowledge in real business.', impZh:'Joshua 明确表示，TMX 早期进步的重要来源之一，就是持续学习 Amazon、广告、TikTok 和 AI 等内容，然后再组织内部应用和传播。', impEn:'Joshua made it clear that one important source of early TMX progress was continuous learning about Amazon, advertising, TikTok, AI, and more, followed by internal application and spread.', pointsZh:['通过关键词查找课程和材料，并识别优质学习资源。','重点识别优秀教练和高价值内容，而不是泛泛浏览。','将课程内容翻译、总结、交流并转化为内部可执行做法。','建立 UPX 列表和学习机制，让知识从个人学习变成团队能力。'], pointsEn:['Use keywords to search for courses and materials, and identify strong learning resources.','Focus on identifying strong coaches and high-value content rather than browsing randomly.','Translate, summarize, discuss, and convert course content into executable internal practices.','Build a UPX list and learning mechanism so that knowledge grows from individual learning into team capability.']},
      {code:'BSD', tag:'Foundation', icon:'💬', titleZh:'BSD 头脑风暴法', titleEn:'BSD Brainstorming', fullEn:'BSD Concept and Importance', defZh:'BSD 是围绕单一问题、单一主题展开的正式讨论机制，通过提前准备材料、邀请最了解问题的人、聚焦讨论和形成思路，来提升问题解决效率。', defEn:'BSD is a formal discussion mechanism focused on one issue or one topic at a time. It improves problem solving by requiring preparation in advance, bringing in the people who understand the issue best, focusing the discussion, and forming clear approaches.', impZh:'Joshua 反复强调，很多大问题都起点于高质量讨论。BSD 的意义不是“多开会”，而是让会议准备充分、聚焦问题、不浪费时间。', impEn:'Joshua repeatedly emphasized that many major solutions start from high-quality discussion. BSD is not about having more meetings, but about meetings that are prepared, focused, and efficient.', pointsZh:['发现问题后，就应发起 BSD，而不是放任问题散落。','会议前应通过文档或录屏共享背景材料，确保参与者充分理解问题。','一般一场 BSD 只聚焦一个问题，通常 20–60 分钟。','可以结合 AI 生成讨论思路、问题清单和可能路径。'], pointsEn:['Once a problem is found, it should be brought into a BSD rather than left scattered.','Background knowledge should be shared in advance through documents or recordings.','A BSD should usually focus on one issue only and typically lasts 20–60 minutes.','AI can support the discussion with approaches, question lists, and possible paths.']},
      {code:'VBA', tag:'Foundation', icon:'🔎', titleZh:'VBA 反向竞对分析法', titleEn:'VBA Reverse Competitor Analysis', fullEn:'VBA Concept / Reverse Competitor Analysis', defZh:'VBA 是通过分析优秀竞争对手的做法，反向学习其页面表达、关键词、视频、组织结构、岗位设置、投入策略和执行方式的方法。', defEn:'VBA is a method for learning in reverse by analyzing how strong competitors operate, including their page expression, keywords, videos, organization structure, roles, investment strategies, and execution approaches.', impZh:'Joshua 指出，任何业务都不是孤立的。公司可以通过看别人怎么做，快速找到更好的参考路径，从而减少试错成本。', impEn:'Joshua pointed out that no business exists in isolation. By seeing how others work, the company can quickly find stronger reference paths and reduce the cost of trial and error.', pointsZh:['可分析页面文案、关键词、主图、视频和营销表达等外部可见内容。','也可分析竞对公司结构、岗位设置、简历信息和策略痕迹。','基于项目理解，借助 AI 列出竞对名单及其主要做法。','VBA 的目标不是简单模仿，而是找到适合本项目的优秀参考。'], pointsEn:['Analyze externally visible content such as page wording, keywords, hero images, videos, and marketing expression.','Also analyze competitor company structure, role setup, resume information, and strategic traces.','Use AI to list competitors and their main practices based on the project context.','The goal is not simple imitation, but finding strong references that fit the current project.']}
    ]
  },
  {
    id:'tools', number:'04', navZh:'方法与工具', navEn:'Methods & Tools',
    sectionTitleZh:'Methods & Tools：标准化与支撑层', sectionTitleEn:'Methods & Tools: Standardization and Support Layer',
    sectionIntroZh:'这一层方法用来统一概念、沉淀流程、组织培训并推动公司内传播，是 TMX 从“个人会做”走向“团队会做”的关键。',
    sectionIntroEn:'This layer standardizes concepts, accumulates procedures, organizes training, and drives company-wide circulation. It is the key bridge that turns “one person can do it” into “the team can do it.”',
    methods:[
      {code:'COX', tag:'Tool', icon:'🏷️', titleZh:'COX 代码与概念标准', titleEn:'COX Code and Concept Standard', fullEn:'Code of MX: Core Concepts, KPIs, and Codes', defZh:'COX 是公司内部的概念、KPI 和代码词典，用来为高频方法、术语和对象提供统一且可搜索的标准定义。', defEn:'COX is the internal dictionary of concepts, KPIs, and codes. It provides unified, searchable standard definitions for frequently used methods, terms, and objects.', impZh:'Joshua 专门强调，精确代码和精确定义能让不同团队、不同地点的人快速对齐，也让 AI 更容易准确理解内部表达。', impEn:'Joshua specifically emphasized that precise codes and definitions help people across teams and locations align quickly, and make it easier for AI to understand internal language accurately.', pointsZh:['维护公司级核心概念、KPI 和代码。','支持 Outlook / 微信 / 文档等场景的快速搜索和引用。','为项目建立相关 COX 条目，减少沟通歧义。','是 AI 友好的表达基础。'], pointsEn:['Maintain company-level core concepts, KPIs, and codes.','Support quick search and reference in Outlook, WeChat, documents, and other work scenarios.','Build project-related COX items to reduce ambiguity.','Provide an AI-friendly expression layer.']},
      {code:'OPI', tag:'Tool', icon:'🗂️', titleZh:'OPI 操作流程索引', titleEn:'OPI Operation Procedure Index', fullEn:'Standard Operation Procedure (SOP) Index', defZh:'OPI 用于把工作步骤化、流程化，让执行者可以按明确步骤完成任务并减少遗漏。', defEn:'OPI turns work into clear procedures and indexed steps so executors can complete tasks in a structured way and reduce omissions.', impZh:'很多问题如果有明确步骤，就更容易复盘、复制和培训，因此 OPI 是方法落地的重要承接层。', impEn:'Once work has clear steps, it becomes easier to review, replicate, and train, which makes OPI an important execution layer.', pointsZh:['建立 SOP 索引，让关键流程可查可用。','在项目中检查“这项工作是否已经考虑 OPI”。','可通过 OPI PEA 继续进行跟进和实现。'], pointsEn:['Build an SOP index so key processes are searchable and reusable.','Check within each project whether OPI has already been considered.','Continue follow-up and implementation through OPI PEA.']},
      {code:'MTA', tag:'Tool', icon:'📚', titleZh:'MTA 培训机制', titleEn:'MTA Training Mechanism', fullEn:'Project-linked Training and Knowledge Spread', defZh:'MTA 是围绕项目上线、能力补足和知识扩散而建立的培训机制，用来把方法和案例转化为面向不同对象的培训内容。', defEn:'MTA is a training mechanism built around project launch, capability building, and knowledge spread. It turns methods and cases into training content for different audiences.', impZh:'Joshua 强调，公司愿意持续投资员工教育，因此 MTA 是 TMX 的关键组成部分。', impEn:'Joshua stressed that the company continuously invests in employee education, which is why MTA is a key part of TMX.', pointsZh:['每个项目启动后，应思考对应的 MTA 是什么。','通过链接、要点和层级机制，沉淀培训内容。','特别适用于 AI 课程、方法培训和项目复盘培训。'], pointsEn:['After each project launches, define the corresponding MTA.','Accumulate training content through links, key points, and level-based mechanisms.','Especially useful for AI courses, method training, and project retrospectives.']},
      {code:'MCC', tag:'Tool', icon:'📣', titleZh:'MCC 公司内传播机制', titleEn:'MCC Internal Communication and Circulation', fullEn:'Spread Methods and Knowledge Across the Company', defZh:'MCC 用于把项目、方法、案例和经验从局部小组传播到更大范围，让“知道的人”不断扩展。', defEn:'MCC spreads projects, methods, cases, and experience from a local group to a broader audience so that the circle of people who understand them keeps expanding.', impZh:'Joshua 明确说，很多事情不能只停留在一个房间里，而要让更多人知道、理解并会用。', impEn:'Joshua clearly said that many things cannot stay confined to one room. More people need to know, understand, and use them.', pointsZh:['当项目达到一定阶段后，应补充 MCC 链接或传播动作。','思考本项目哪些内容需要公司范围传播。','MCC 是把方法影响力扩散到组织层的关键手段。'], pointsEn:['Once a project reaches a certain stage, add MCC links or dissemination actions.','Think about which parts of the project should be spread company-wide.','MCC is a key mechanism for expanding method influence to the organization level.']},
      {code:'3MM', tag:'Tool', icon:'⏱️', titleZh:'Three-minute Meeting 快速同步法', titleEn:'Three-minute Meeting', fullEn:'Short, High-frequency Alignment', defZh:'Three-minute Meeting 是一种极简、短频快的同步机制，用于在正式会议之间快速对齐最新状态、重点变化和下一步动作。', defEn:'The Three-minute Meeting is a lightweight, short, and high-frequency alignment mechanism used to quickly sync the latest status, important changes, and next actions between formal meetings.', impZh:'它让信息不必总等待大会议才更新，适合在节奏较快的项目中保持低成本沟通。', impEn:'It avoids waiting for large meetings before information is updated and is useful for maintaining low-cost communication in fast-moving projects.', pointsZh:['聚焦状态、变化和下一步，不展开大讨论。','适合正式会议之间的快速对齐。','与 BSD、MCC、TMM 等方法配合，可以提升整体节奏感。'], pointsEn:['Focus on status, changes, and next steps rather than deep discussion.','Best used for quick alignment between formal meetings.','When combined with BSD, MCC, and TMM, it strengthens execution rhythm.']},
      {code:'VIM', tag:'Tool', icon:'🖼️', titleZh:'VIM 可视化信息管理', titleEn:'VIM Visual Information Management', fullEn:'Use Visual Expression to Improve Understanding', defZh:'VIM 强调通过可视化方式组织和表达信息，让复杂内容更容易被快速阅读、理解和复用。', defEn:'VIM emphasizes organizing and expressing information visually so that complex content becomes easier to read, understand, and reuse quickly.', impZh:'TMX 本身大量使用思维导图、矩阵、流程图和视觉化表达，VIM 是这种做法背后的通用原则。', impEn:'TMX itself uses mind maps, matrices, flowcharts, and visual expression extensively. VIM is the general principle behind that way of working.', pointsZh:['把复杂信息转成更易理解的视觉结构。','适用于汇报、培训、项目结构整理和方法同步。','与 DVA、TMM、MTX、KMM 等方法天然协同。'], pointsEn:['Turn complex information into easier-to-understand visual structures.','Useful for reporting, training, project structuring, and method synchronization.','Naturally works well with DVA, TMM, MTX, KMM, and related methods.']},
      {code:'AI', tag:'Tool', icon:'🤖', titleZh:'AI 赋能工作法', titleEn:'AI-enabled Work', fullEn:'AI as an Everyday Productivity Layer', defZh:'AI 在 TMX 中不是单独模块，而是贯穿学习、讨论、分析、结构化表达、闭环管理和培训的增强层。', defEn:'Within TMX, AI is not an isolated module. It is an enhancement layer running through learning, discussion, analysis, structured expression, closed-loop management, and training.', impZh:'Joshua 在会议中多次提到，AI 让内容理解、结构转换和方法复用更快，因此应尽量嵌入到已有工作方法中。', impEn:'Joshua repeatedly noted that AI makes content understanding, structure conversion, and method reuse faster, so it should be embedded into existing work methods as much as possible.', pointsZh:['可辅助生成 BSD 讨论思路、VBA 竞对列表和 TMM 结构。','可在 TMM、PEA、MTX、KMM 之间帮助转换结构。','可用于培训内容、海报、一页纸和汇报草稿生成。'], pointsEn:['Use it to support BSD discussion approaches, VBA competitor lists, and TMM structures.','Use it to help convert between TMM, PEA, MTX, and KMM structures.','Use it to generate training content, posters, one-pagers, and reporting drafts.']}
    ]
  },
  {
    id:'four', number:'05', navZh:'四件套', navEn:'Four-piece Set',
    sectionTitleZh:'四件套：项目结构化表达与跟进', sectionTitleEn:'Four-piece Set: Project Structuring and Follow-up',
    sectionIntroZh:'TMM、PEA、MTX、KMM 是 TMX 中非常关键的四种结构化表达和跟进方式，它们可以从不同角度承载同一个项目。',
    sectionIntroEn:'TMM, PEA, MTX, and KMM are four very important TMX structures for expression and follow-up. They can all carry the same project from different angles.',
    methods:[
      {code:'TMM', tag:'Structure', icon:'🧠', titleZh:'TMM 思维导图主页', titleEn:'TMM Mind Map Home Page', fullEn:'Mind-map Structure for Project Understanding', defZh:'TMM 通过思维导图分层组织项目背景、5W2H、待办、交付物和 SOP，是理解和展开项目的主结构。', defEn:'TMM organizes project background, 5W2H, to-do items, deliverables, and SOPs in layered mind-map form. It is the main structure for understanding and expanding a project.', impZh:'Joshua 特别说明，TMM 不是 Word，也不是 Excel，而是层级化组织复杂信息的方式。', impEn:'Joshua specifically explained that TMM is neither Word nor Excel; it is a layered way to organize complex information.', pointsZh:['适合梳理项目主体结构和关键问题。','可以承接 To-do List、Concrete Deliverables、SOP 等内容。','是后续 PEA、MTX、KMM 等表达形式的重要输入源。'], pointsEn:['Useful for structuring the main body of a project and its key questions.','Can carry the to-do list, concrete deliverables, SOPs, and related content.','Acts as an important input source for later PEA, MTX, and KMM.']},
      {code:'PEA', tag:'Structure', icon:'📋', titleZh:'PEA 跟进与落地', titleEn:'PEA Follow-up and Implementation', fullEn:'Execution Follow-up Database / Table Layer', defZh:'PEA 是把项目从结构理解转向任务跟进和执行落地的承接层，用于记录方案、计划、风险、任务拆解、实验、周报和复盘。', defEn:'PEA is the carrying layer that turns project understanding into execution follow-up and implementation. It records solutions, plans, risks, task breakdowns, experiments, weekly reporting, and retrospectives.', impZh:'它让项目不只停留在图上，而是进入表格化、数据库化、可追踪的执行状态。', impEn:'It ensures that a project does not stay only on a diagram, but enters a tabular, database-like, and trackable execution state.', pointsZh:['承接方案、计划、风险清单。','承接任务拆解、A/B/PoC、小实验、周报和复盘。','与 TMM 相互配合：TMM 偏结构理解，PEA 偏执行跟踪。'], pointsEn:['Carry solutions, plans, and risk lists.','Carry task breakdowns, A/B/PoC trials, small experiments, weekly reporting, and retrospectives.','Work together with TMM: TMM leans toward structure, while PEA leans toward execution tracking.']},
      {code:'MTX', tag:'Structure', icon:'🔢', titleZh:'MTX 矩阵表达', titleEn:'MTX Matrix', fullEn:'Matrix Expression for Relationship Modeling', defZh:'MTX 通过矩阵结构表达对象、维度、关系和对比，适合把复杂问题转成更清晰的二维或多维模型。', defEn:'MTX uses matrix structures to express objects, dimensions, relationships, and comparisons. It is suitable for turning complex issues into clearer two-dimensional or multi-dimensional models.', impZh:'Joshua 直接指出，矩阵简单但非常有力，很多脑中难以整理的内容，一旦放入矩阵，就更容易建模和分析。', impEn:'Joshua directly pointed out that a matrix is simple but very powerful. Many things become easier to model and analyze once put into a matrix.', pointsZh:['适合做关系梳理、角色分工、项目维度对比和知识建模。','有利于把思考结构化并支持 AI 理解。','可以与 TMM 和 KMM 互相转换。'], pointsEn:['Useful for relationship mapping, role allocation, project dimension comparison, and knowledge modeling.','Helps structure thinking and supports AI understanding.','Interchangeable with TMM and KMM.']},
      {code:'KMM', tag:'Structure', icon:'🪜', titleZh:'KMM 流程图表达', titleEn:'KMM Flowchart', fullEn:'Flow-based Process Expression', defZh:'KMM 用流程图表达工作路径、步骤顺序和分支逻辑，适合把“怎么做”明确画出来。', defEn:'KMM uses flowcharts to express work paths, step sequence, and branch logic. It is suitable for drawing out exactly how work should be done.', impZh:'对于需要流程清晰、上下游明确的工作，KMM 是非常直接且高效的表达形式。', impEn:'For work that requires clear flow and clear upstream-downstream connections, KMM is a very direct and efficient expression form.', pointsZh:['适合表达流程、节点、判断条件和分支。','便于培训、交接和 SOP 制作。','可与 TMM、PEA、MTX 共同承载同一项目。'], pointsEn:['Useful for expressing processes, nodes, decision points, and branches.','Convenient for training, handoff, and SOP creation.','Can carry the same project together with TMM, PEA, and MTX.']}
    ]
  },
  {
    id:'aix', number:'06', navZh:'AIX 工作法', navEn:'AIX Work Methods',
    sectionTitleZh:'AIX 工作法：AI 时代的闭环方法层', sectionTitleEn:'AIX Work Methods: The Closed-loop Method Layer for the AI Era',
    sectionIntroZh:'AIX 工作法用于把 AI 深度嵌入到项目理解、问题重构、决策、推进、沉淀和复盘中。以下内容融合了 XMind 中补充的新方法和 Joshua 分享中对 TMX / AI 方法的整体理解。',
    sectionIntroEn:'AIX work methods embed AI deeply into project understanding, issue reconstruction, decision-making, execution, accumulation, and review. The following content integrates the new methods added in the XMind file and Joshua’s overall TMX / AI method understanding.',
    methods:[
      {code:'GPS', tag:'AIX', icon:'🛰️', titleZh:'GPS 目标计划导航法', titleEn:'GPS Goal Planning Navigation Method', fullEn:'Goal - Priority - Schedule', defZh:'GPS 是把目标拆成优先级、执行节奏和闭环复盘的方法，不是普通周计划，而是目标驱动的周会闭环。', defEn:'GPS turns goals into priorities, execution rhythm, and review loops. It is not a normal weekly plan, but a goal-driven weekly closed loop.', impZh:'GPS 解决“目标如何真正落到周、日动作”的问题，也是 TDA 决策进入执行后的主要承接方式。', impEn:'GPS solves the problem of how goals truly translate into weekly and daily actions, and it is also the main follow-up mechanism after a TDA decision enters execution.', pointsZh:['核心字段包括目标、P0/P1/P2、Owner、交付物、截止时间和验收标准。','强调先定目标，再排优先级，再拆到周和日。','适合项目推进、周会管理和阶段性目标跟踪。'], pointsEn:['Core fields include goals, P0/P1/P2, owner, deliverables, deadline, and acceptance criteria.','It emphasizes setting the goal first, then prioritizing, then breaking down into weekly and daily actions.','Useful for project execution, weekly management, and stage-goal tracking.']},
      {code:'AIM', tag:'AIX', icon:'🎯', titleZh:'AIM 五象限闭环法', titleEn:'AIM Five-quadrant Closed-loop Method', fullEn:'D → B → A → C → E', defZh:'AIM 通过 D 问题/需求池、B 突击攻坚、A 成果案例、C 方法模板、E 能力沉淀五个象限，把一次性任务转化为可复用的成果与能力。', defEn:'AIM uses five quadrants—D problem / requirement pool, B taskforce breakthrough, A results / cases, C methods / templates, and E capability accumulation—to turn one-off tasks into reusable results and capabilities.', impZh:'AIM 的价值不是“做完一件事”，而是让事情继续沉淀、扩散和复用。', impEn:'The value of AIM is not simply finishing one task, but allowing the work to continue accumulating, spreading, and being reused.', pointsZh:['适用于 AI 应用、培训案例、项目成果榜和方法沉淀。','强调问题要进入池子、成果要形成案例、方法要形成模板、能力要继续积累。','有助于把零散事项串成真正的闭环。'], pointsEn:['Applicable to AI applications, training cases, project result boards, and method accumulation.','It emphasizes that problems enter a pool, results become cases, methods become templates, and capability continues to accumulate.','It helps turn scattered items into a real closed loop.']},
      {code:'LCM', tag:'AIX', icon:'🧾', titleZh:'LCM 历史资料整合与上下文重构法', titleEn:'LCM Historical Material Integration and Context Reconstruction Method', fullEn:'Read History First; Do Not Start from Zero', defZh:'LCM 要求先收集历史 TMM、会议纪要、录屏转写、项目背景和已有模板，再让 AI 先理解，再按目标重构。', defEn:'LCM requires collecting historical TMMs, meeting notes, recording transcripts, project background, and existing templates first, letting AI understand them first, and only then reconstructing them toward the goal.', impZh:'LCM 解决“做事不要从零开始”的问题，是 AI 真正进入复杂项目理解的重要前提。', impEn:'LCM solves the problem of always starting from scratch and is a key precondition for AI to truly engage with complex project understanding.', pointsZh:['第一步是找资料，不是急着输出。','常用口径是“先通读理解，不漏细节，不做扩展”。','之后再按 GPS、AIM、TAP、培训材料、一页纸等结构重构。'], pointsEn:['The first step is to find the materials, not to rush to produce output.','A common prompt style is “first read and understand, with no missing details and no expansion.”','After understanding, reconstruct into GPS, AIM, TAP, training materials, one-pagers, and similar forms.']},
      {code:'AIX-CHAIN', tag:'AIX', icon:'🔗', titleZh:'AIX 主链路', titleEn:'Main AIX Method Chain', fullEn:'LCM → ELD → AIM / BIM → TDA → GPS', defZh:'AIX 主链路说明了 AI 方法的整体推进顺序：先读历史，再做重构，再形成闭环，再做阶段决策，最后拆到执行。', defEn:'The main AIX method chain explains the overall progression of AI methods: read history first, then reconstruct, then form the loop, then make a stage decision, and finally break down into execution.', impZh:'它有助于新同事理解各方法之间不是平行关系，而是有顺序、有承接的。', impEn:'It helps new colleagues understand that the methods are not just parallel concepts, but have sequence and handoff relationships.', pointsZh:['LCM：不从零开始。','ELD：从点到类做重构。','AIM / BIM：形成问题—成果—方法—能力的闭环。','TDA：在样板房/1.0/试点后做拍板。','GPS：把决策拆到月、周、日。'], pointsEn:['LCM: do not start from zero.','ELD: reconstruct from one point to a category.','AIM / BIM: form a loop from problems to results, methods, and capability.','TDA: make a decision after a sample room / 1.0 / pilot.','GPS: break the decision into monthly, weekly, and daily actions.']},
      {code:'ELD', tag:'AIX', icon:'🧩', titleZh:'ELD 核心重构法', titleEn:'ELD Core Reconstruction Method', fullEn:'Reconstruct the Whole Category Clearly', defZh:'ELD 强调不要只修补单点问题，而要把问题扩展为一类问题并做结构化重构。', defEn:'ELD emphasizes not merely patching one isolated problem, but expanding it into a category of issues and reconstructing it structurally.', impZh:'它让团队从临时处理升级到结构化解决，是 AI 真正发挥作用的重要场景。', impEn:'It upgrades the team from temporary handling to structural problem solving and is an important scenario where AI can truly create value.', pointsZh:['从单点扩展到一类问题。','从人工经验升级为 AI 辅助重构。','输出不只是答案，还包括流程、模板、样板房、Skill 和培训材料。'], pointsEn:['Expand from one point into a category of issues.','Upgrade from manual experience to AI-assisted reconstruction.','Output not only answers, but also processes, templates, sample rooms, skills, and training materials.']},
      {code:'TDA', tag:'AIX', icon:'⚖️', titleZh:'TDA 决策方法', titleEn:'TDA Decision Method', fullEn:'Test → Decision → Apply', defZh:'TDA 用于在样板房、1.0 或试点后做阶段性判断：是否继续推进、在什么条件下推进、还是暂缓。', defEn:'TDA is used to make stage decisions after a sample room, 1.0, or pilot: whether to continue, under what conditions to continue, or whether to hold.', impZh:'它解决“做完样板之后怎么办”的问题，避免项目长期停留在试点不拍板。', impEn:'It solves the question of what to do after a sample room is built and prevents projects from staying in pilot mode without a decision.', pointsZh:['T：提供样板房、数据、案例、问题和反馈。','D：做出 Go / Conditional Go / Hold / No-Go 判断。','A：把结果转成 GPS、TAP、Owner、交付物和验收标准。'], pointsEn:['T: provide sample rooms, data, cases, issues, and feedback.','D: make a Go / Conditional Go / Hold / No-Go judgment.','A: convert the result into GPS, TAP, owner, deliverables, and acceptance criteria.']},
      {code:'BIM', tag:'AIX', icon:'🏢', titleZh:'BIM BU 管理闭环法', titleEn:'BIM BU Management Closed-loop Method', fullEn:'BU Management Version Referencing AIM', defZh:'BIM 参考 AIM 结构，但用于 BU 管理场景，重点不是写执行动作，而是看项目健康度、风险、资源、决策和下周调整。', defEn:'BIM references the AIM structure but is designed for BU management scenarios. Its focus is not on writing execution actions, but on project health, risks, resources, decisions, and next-week adjustments.', impZh:'BIM 让管理层的周总结和项目管理不再停留在“有没有做”，而是升级为“是否健康、是否可持续推进”。', impEn:'BIM upgrades management weekly summaries and project oversight from simply “was it done?” to “is it healthy, and can it continue sustainably?”', pointsZh:['适用于 BU 周总结、BU 管理会和跨项目管理。','用于管理判断而不是代替执行。','是 AIM 在管理层的应用延伸。'], pointsEn:['Useful for BU weekly summaries, BU management meetings, and cross-project management.','It supports management judgment rather than replacing execution.','It is an extension of AIM at the management level.']},
      {code:'TMM/TAP/CSI/OPT', tag:'AIX', icon:'🔄', titleZh:'TMM / TAP / CSI / OPT 闭环', titleEn:'TMM / TAP / CSI / OPT Closed Loop', fullEn:'Background → Execution → Reporting → Historical Pool', defZh:'这套闭环把项目背景、正式执行、汇总反馈和历史任务池串起来，避免信息散落在不同位置。', defEn:'This loop connects project background, formal execution, reporting feedback, and the historical task pool so that information does not stay scattered across different places.', impZh:'它是 TMX 与 AIX 在日常项目管理中最实用的闭环之一。', impEn:'It is one of the most practical loops in daily project management under TMX and AIX.', pointsZh:['GPS 定目标和节奏。','TMM 保留背景、讨论过程和判断依据。','TAP 承接正式需求、任务、缺陷和结果。','CSI 从 TMM / TAP 汇总日报、周报和项目报告。'], pointsEn:['GPS sets the goals and rhythm.','TMM keeps background, discussion process, and judgment basis.','TAP carries formal requirements, tasks, defects, and results.','CSI summarizes daily, weekly, and project reports from TMM / TAP.']},
      {code:'TAP6', tag:'AIX', icon:'📝', titleZh:'TAP 卡片六要素', titleEn:'Six Elements of a TAP Card', fullEn:'Standard Structure for Formal Work Items', defZh:'TAP 卡片六要素规定了正式事项应至少包含：来源、背景摘要、本卡目标、执行范围、负责人和截止时间、验收标准。', defEn:'The Six Elements of a TAP Card specify that a formal work item should include at least source, background summary, goal of the card, execution scope, owner and deadline, and acceptance criteria.', impZh:'它让事项从“知道要做”变成“可执行、可协同、可验收”。', impEn:'It turns an item from “we know it should be done” into something executable, collaborative, and reviewable.', pointsZh:['适用于需求、任务和缺陷的标准表达。','有助于减少 TAP 卡片信息不足或描述过散。','适合做新人培训和跨团队协作对齐。'], pointsEn:['Useful as a standard structure for requirements, tasks, and defects.','Helps reduce TAP cards that are too thin or too scattered.','Good for new-hire training and cross-team alignment.']},
      {code:'SR1', tag:'AIX', icon:'🏠', titleZh:'1.0 / 样板房 / 60 分到 90 分', titleEn:'1.0 / Sample Room / From 60 Points to 90 Points', fullEn:'Start Small, Visible, and Verifiable', defZh:'这组原则要求先做一个可见、可讨论、可验证的 1.0，并在真实业务场景中跑出样板房，再根据反馈从 60 分提升到 90 分。', defEn:'This group of principles requires building a visible, discussable, and verifiable 1.0 first, running a sample room in a real business scenario, and then improving from 60 points to 90 points based on feedback.', impZh:'它帮助团队先用最小可验证结果推动讨论，而不是一开始追求完美。', impEn:'It helps the team drive discussion with the smallest verifiable result first instead of pursuing perfection from the start.', pointsZh:['先跑通一个真实样板房。','先达到能运行的 60 分，再迭代到更高质量。','样板房通过 TDA 后，再判断是否批量化。'], pointsEn:['First run through one real sample room.','Reach a runnable 60-point version first, then iterate toward higher quality.','After the sample room passes TDA, decide whether to scale it.']},
      {code:'ODP', tag:'AIX', icon:'📅', titleZh:'一天原则', titleEn:'One-day Principle', fullEn:'Produce a 1.0 in One Day When Possible', defZh:'一天原则要求优先选择当天能做出一个可见 1.0 的切口，用中间结果推动下一轮讨论。', defEn:'The One-day Principle asks teams to prioritize entry points that can produce a visible 1.0 on the same day and use that intermediate result to drive the next discussion.', impZh:'它能显著降低任务启动门槛，避免长期停留在抽象讨论。', impEn:'It significantly lowers the start-up threshold of a task and avoids staying too long in abstract discussion.', pointsZh:['先找最小切口。','当天就要有可看的中间结果。','不要一次追求完整闭环，而要先推动下一步。'], pointsEn:['Find the smallest entry point first.','Have a visible intermediate result on the same day.','Do not chase a fully complete loop at once; first drive the next step.']},
      {code:'8020', tag:'AIX', icon:'📊', titleZh:'二八定理', titleEn:'80/20 Rule', fullEn:'Prioritize the Most Valuable 20%', defZh:'二八定理要求优先抓住最关键、最高频、最有价值的少数事项，而不是平均分配精力。', defEn:'The 80/20 Rule asks teams to capture the small number of items that are most critical, most frequent, and most valuable rather than spreading effort evenly.', impZh:'它帮助团队在资源有限时更快打出结果。', impEn:'It helps the team produce results faster when resources are limited.', pointsZh:['P0 不宜过多，通常先抓 2–3 个关键点。','优先解决能放大价值的问题。','适合用于项目推进、培训安排和问题池筛选。'], pointsEn:['Do not set too many P0 items; usually start with 2–3 key items.','Prioritize problems that can amplify value.','Useful for project execution, training arrangement, and screening a problem pool.']},
      {code:'RAM', tag:'AIX', icon:'🎥', titleZh:'录屏沉淀法', titleEn:'Recording-based Accumulation Method', fullEn:'Record First, Then Reuse', defZh:'录屏沉淀法要求尽量记录会议、操作和系统流程，并在转写后输入到 LCM / TMM 中，让 AI 先理解历史，再形成训练与沉淀。', defEn:'The Recording-based Accumulation Method asks teams to record meetings, operations, and system processes whenever possible, then feed the transcripts into LCM / TMM so AI can understand the history first and help build training materials and accumulated knowledge.', impZh:'它是让隐性经验变成显性资产的重要方法。', impEn:'It is an important way to turn tacit experience into explicit assets.', pointsZh:['适合会议、系统操作、流程说明和培训演示。','录屏转写后可再用于 MKD、UPX、一页纸、案例和 Skill。','与 DAB、LCM、AIM 等方法天然协同。'], pointsEn:['Useful for meetings, system operations, process explanation, and training demos.','After transcription, recordings can be reused for MKD, UPX, one-pagers, cases, and skills.','Naturally works together with DAB, LCM, and AIM.']},
      {code:'ACS', tag:'AIX', icon:'🪄', titleZh:'AI 应用案例分享法', titleEn:'AI Application Case Sharing Method', fullEn:'Make AI Cases Easy to Understand and Reuse', defZh:'该方法要求每个 AI 案例都要讲清：和谁有关、什么时候可用、应该怎么问、用完下一步做什么。', defEn:'This method requires every AI case to clearly explain who it is relevant to, when it can be used, how it should be asked, and what to do next after using it.', impZh:'它解决“AI 案例看起来很好，但别人不会用”的问题。', impEn:'It solves the problem of “the AI case looks good, but others do not know how to use it.”', pointsZh:['适用于 A1 实际应用、A2 成果榜、C 方法和 E 能力沉淀。','重点是让业务同事快速理解场景、问法和下一步。','适合做海报、一页纸、培训和案例库。'], pointsEn:['Useful for A1 practical applications, A2 result boards, C methods, and E capability accumulation.','The focus is helping business colleagues quickly understand the scenario, prompting style, and next step.','Good for posters, one-pagers, training, and case libraries.']},
      {code:'RQM', tag:'AIX', icon:'❓', titleZh:'正确问法方法', titleEn:'Method for Asking the Right Questions', fullEn:'Prompt with Scenario, Goal, and Boundaries', defZh:'正确问法要求提问时带上系统/页面/业务场景、具体事项、具体问题、期待解释的内容以及下一步目标。', defEn:'The Method for Asking the Right Questions requires users to provide the system / page / business scenario, the specific matter, the specific problem, what kind of explanation is needed, and the next-step goal.', impZh:'它直接影响 AI 输出质量，是新人使用 AI 的基础能力。', impEn:'It directly affects AI output quality and is a foundational capability for new colleagues using AI.', pointsZh:['问题中要带场景、材料、目标、边界和预期输出。','可采用标准模板句式。','AI 不是最终审批人，规则变更和业务判断仍需负责人确认。'], pointsEn:['Questions should include scenario, materials, goal, boundaries, and expected output.','A standard prompt sentence can be used as a template.','AI is not the final approver; rule changes and business judgments still require owner confirmation.']},
      {code:'SKL', tag:'AIX', icon:'🛠️', titleZh:'Skill 化方法', titleEn:'Skillization Method', fullEn:'Turn Successful Work into Repeatable Process', defZh:'Skill 化方法要求把已经跑通、效果好的工作方式沉淀成可反复调用的流程、模板或 SOP。', defEn:'The Skillization Method asks teams to turn work methods that have already run successfully into repeatable processes, templates, or SOPs.', impZh:'它让“会做一次”变成“可以反复做、别人也能做”。', impEn:'It turns “we can do it once” into “we can do it repeatedly, and others can do it too.”', pointsZh:['适用于会议纪要、GPS 拆解、TAP 卡片、周总结和海报输出。','先做样板，再沉淀为 Skill。','是规模化推广 AI 工作方式的关键一步。'], pointsEn:['Useful for meeting notes, GPS breakdowns, TAP cards, weekly summaries, and poster output.','Build the sample first, then solidify it into a skill.','It is a key step for scaling AI work methods.']},
      {code:'UMA', tag:'AIX', icon:'🗃️', titleZh:'UMA 方法', titleEn:'UMA Method', fullEn:'Organize System, Business, Process, and Data Logic', defZh:'UMA 的目标是把系统、业务、流程和数据逻辑组织成 AI 能理解、业务团队也能使用的内容。', defEn:'The goal of UMA is to organize system, business, process, and data logic into content that AI can understand and business teams can also use.', impZh:'它是连接技术、业务和 AI 理解的重要桥梁。', impEn:'It is an important bridge connecting technology, business, and AI understanding.', pointsZh:['适合梳理复杂系统和业务逻辑。','让技术内容更容易被业务理解和使用。','也为 AI 后续分析和生成提供更清晰语料。'], pointsEn:['Useful for sorting out complex systems and business logic.','Makes technical content easier for business teams to understand and use.','Provides clearer material for later AI analysis and generation.']},
      {code:'BAI', tag:'AIX', icon:'👥', titleZh:'BAI AI 突击队', titleEn:'BAI AI Taskforce', fullEn:'IT + BMO + Business Breakthrough Team', defZh:'BAI 是围绕一个项目形成的 AI 突击小组，通常由 IT、BMO 和业务同事共同组成，按周拆任务逐步突破。', defEn:'BAI is an AI taskforce formed around one project, usually combining IT, BMO, and business colleagues, and making progress week by week.', impZh:'它强调“围绕真实项目攻坚”，而不是脱离业务地泛泛谈 AI。', impEn:'It emphasizes working through real projects rather than discussing AI in isolation from business.', pointsZh:['组队很重要，项目选择也很重要。','适合以周为节奏逐步解决问题。','是 AI 从概念进入业务落地的重要机制。'], pointsEn:['Team formation matters, and project selection matters as well.','It is suitable for solving problems gradually at a weekly cadence.','It is an important mechanism for bringing AI from concept into business application.']},
      {code:'TBT', tag:'AIX', icon:'🧪', titleZh:'TBT 类型化模板与样板房法', titleEn:'TBT Template by Type and Sample Room Method', fullEn:'Template Map and Sample-room-driven Popularization', defZh:'TBT 用于按类型整理模板与案例，并强调用真实样板房把 AI 用法展示给更多人看。', defEn:'TBT is used to organize templates and cases by type, while emphasizing the use of real sample rooms to demonstrate AI usage to more people.', impZh:'它能够降低理解门槛，让“AI 能做什么”变得具体可见。', impEn:'It lowers the understanding threshold and makes “what AI can do” concrete and visible.', pointsZh:['可沉淀模板地图和案例模板。','强调真实场景、真实输出和可模仿样板。','适合做推广和新人培训。'], pointsEn:['It can accumulate template maps and case templates.','It emphasizes real scenarios, real outputs, and imitable examples.','Useful for internal promotion and new-hire training.']},
      {code:'DVA', tag:'AIX', icon:'📊', titleZh:'DVA AI 数据可视化表达法', titleEn:'DVA Data Visualization Using AI', fullEn:'Visual Chart Expression', defZh:'DVA 通过 AI 把信息整合为信息图、概念图、Dashboard 或一页纸，提升表达和理解效率。', defEn:'DVA uses AI to integrate information into infographics, concept maps, dashboards, or one-page reports to improve expression and understanding.', impZh:'它是把复杂信息快速转成管理层或团队可读结果的重要方法。', impEn:'It is an important method for quickly turning complex information into outputs that management or teams can read.', pointsZh:['DV1 信息图：适合讲故事、时间线和对比。','DV2 导图：适合关系和知识结构。','DV3 Dashboard：适合实时关键数据。','DV4 一页纸：适合“摘要 + 图表 + 结论”。'], pointsEn:['DV1 Infographic: suitable for storytelling, timelines, and comparisons.','DV2 Mind map: suitable for relationships and knowledge structure.','DV3 Dashboard: suitable for real-time key data.','DV4 One-page report: suitable for summary + charts + conclusions.']},
      {code:'DAB', tag:'AIX', icon:'🗣️', titleZh:'DAB 数字化与 AI 驱动沟通法', titleEn:'DAB Digitalized and AI-driven Communication', fullEn:'Digital and AI-enabled BSD Communication', defZh:'DAB 强调把沟通过程数字化、记录化，并在此基础上用 AI 提升沟通质量和后续沉淀效率。', defEn:'DAB emphasizes digitizing and recording communication, and then using AI to improve communication quality and support knowledge accumulation.', impZh:'它让沟通不只停在现场，而能被记录、复盘和再利用。', impEn:'It ensures communication does not remain only in the live moment, but can be recorded, reviewed, and reused.', pointsZh:['最重要的前提是把会议和讨论记录好。','适合与 BSD、RAM、LCM 配合使用。','有助于形成更连续的沟通资产。'], pointsEn:['The most important prerequisite is to record meetings and discussion properly.','Useful together with BSD, RAM, and LCM.','Helps build ongoing communication assets.']},
      {code:'CIL', tag:'AIX', icon:'🔁', titleZh:'CIL 沟通迭代闭环法', titleEn:'CIL Communication Iterative Loop', fullEn:'AI Communication Should Be Iterative', defZh:'CIL 认为 AI 沟通不是一次性问答，而应形成双向、多轮、持续反馈的迭代回路。', defEn:'CIL views AI communication not as a one-off Q&A, but as a two-way, multi-round, continuously improving feedback loop.', impZh:'它有助于把 AI 使用从一次性交付升级为逐步共创。', impEn:'It helps upgrade AI use from one-time delivery to step-by-step co-creation.', pointsZh:['强调持续补充上下文和反馈。','适合复杂项目和多轮打磨任务。','与 LCM、RQM、SKL 等方法配合效果更好。'], pointsEn:['It emphasizes continually adding context and feedback.','Useful for complex projects and multi-round polishing tasks.','Works especially well with LCM, RQM, and SKL.']},
      {code:'EOC', tag:'AIX', icon:'🌐', titleZh:'EOC 由点及面类推探索法', titleEn:'EOC Exploration from One Point to a Broader Landscape', fullEn:'When One Point Is Found, Investigate the Broader Landscape', defZh:'EOC 强调当发现一个事件或问题点后，不应只看单点，而要类推到更广的面去做调查和探索。', defEn:'EOC emphasizes that when one event or problem point is found, teams should not stay on the single point only, but expand by analogy into a broader landscape for investigation and exploration.', impZh:'它让团队更容易找到共性问题、结构性问题和系统性机会。', impEn:'It makes it easier for the team to identify common issues, structural issues, and systemic opportunities.', pointsZh:['从点到面进行推理。','适合做问题扩展和结构化探索。','与 ELD 的重构思想高度协同。'], pointsEn:['Reason from point to surface.','Useful for problem expansion and structured exploration.','Highly aligned with the reconstruction mindset of ELD.']},

  },
  {
    id:'gps-section', number:'01', group:'gps', navZh:'GPS', navEn:'GPS',

let currentLang = 'zh';
let searchQuery = '';
let activeSectionId = data[0].id;
let observer = null;

const t = (item, zhKey, enKey) => currentLang === 'zh' ? item[zhKey] : item[enKey];
const esc = str => String(str || '').replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
const searchText = m => [m.code,m.tag,m.titleZh,m.titleEn,m.fullEn,m.defZh,m.defEn,m.impZh,m.impEn,(m.pointsZh||[]).join(' '),(m.pointsEn||[]).join(' ')].join(' ').toLowerCase();
const cardText = c => [c.titleZh,c.titleEn,c.textZh,c.textEn].join(' ').toLowerCase();
const flowStepText = s => [s.code,s.zh,s.en].join(' ').toLowerCase();

function renderMeta(){
  const lang = ui[currentLang];
  document.getElementById('brand-title').textContent = lang.brandTitle;
  document.getElementById('brand-subtitle').textContent = lang.brandSub;
  document.getElementById('nav-caption').textContent = lang.navCaption;
  document.getElementById('page-title').textContent = lang.pageTitle;
  document.getElementById('page-subtitle').textContent = lang.pageSub;
  document.getElementById('hero-title').textContent = currentLang === 'zh' ? data[0].titleZh : data[0].titleEn;
  document.getElementById('hero-subtitle').textContent = currentLang === 'zh' ? data[0].introZh : data[0].introEn;
  document.getElementById('btn-read').textContent = lang.read;
  document.getElementById('btn-stop').textContent = lang.stop;
  document.getElementById('btn-clear').textContent = lang.clear;
  document.getElementById('search-input').placeholder = lang.searchPlaceholder;
  document.getElementById('search-meta').textContent = lang.searchMeta(searchQuery);
  document.getElementById('sidebar-footer').textContent = lang.sidebarFooter;
  document.getElementById('footer-note').textContent = lang.footer;
  document.getElementById('btn-zh').classList.toggle('active', currentLang === 'zh');
  document.getElementById('btn-en').classList.toggle('active', currentLang === 'en');
  document.getElementById('stat-row').innerHTML = lang.stats.map(s => `<div class="stat"><strong>${s.num}</strong><span>${esc(s.text)}</span></div>`).join('');
}

function renderNav(){
  const nav = document.getElementById('nav-list');
  const groupLabels = {'amazon-woot':'Amazon / Woot', 'gps':'GPS'};
  let lastGroup = 'tmx';
  nav.innerHTML = data.map(sec => {
    const group = sec.group || 'tmx';
    let html = '';
    if(group !== lastGroup){
      lastGroup = group;
      html += `<div class="nav-caption" style="margin-top:16px;">${groupLabels[group] || group}</div>`;
    }
    html += `<a class="nav-item ${sec.id===activeSectionId?'active':''}" data-target="${sec.id}" href="#${sec.id}">
      <span class="num">${sec.number}</span>
      <span>${esc(currentLang==='zh'?sec.navZh:sec.navEn)}</span>
    </a>`;
    return html;
  }).join('');
  nav.querySelectorAll('.nav-item').forEach(a => a.addEventListener('click', e => { e.preventDefault(); activeSectionId = a.dataset.target; searchQuery = ''; document.getElementById('search-input').value = ''; window.scrollTo(0,0); renderAll(); }));
}

function renderCards(cards){
  return `<div class="card-grid">${cards.map(card => `
    <div class="info-card">
      <div class="icon">${card.icon}</div>
      <h4>${esc(currentLang==='zh'?card.titleZh:card.titleEn)}</h4>
      <p>${esc(currentLang==='zh'?card.textZh:card.textEn)}</p>
    </div>`).join('')}</div>`;
}

function renderFlow(sec, filteredItems){
  const items = filteredItems !== undefined ? filteredItems : sec.flow;
  if(!items || !items.length) return '';
  return `
    <div class="section-header" style="margin-top:18px;margin-bottom:10px;">
      <div><h3 style="font-size:20px">${esc(currentLang==='zh'?sec.flowTitleZh:sec.flowTitleEn)}</h3></div>
    </div>
    <div class="flow">${items.map(step => `
      <div class="flow-item"><span class="flow-code">${esc(step.code)}</span><p>${esc(currentLang==='zh'?step.zh:step.en)}</p></div>`).join('')}</div>`;
}

function renderMethod(method){
  const points = (currentLang==='zh'?method.pointsZh:method.pointsEn).map(p => `<li>${esc(p)}</li>`).join('');
  return `
    <article class="method-row">
      <div class="method-meta">
        <span class="label">Code</span>
        <div class="method-code">${esc(method.code)}</div>
        <div class="method-type">${esc(method.tag)}</div>
      </div>
      <div class="method-body">
        <div class="method-title-row">
          <div class="method-title-group">
            <div class="method-icon">${method.icon}</div>
            <div>
              <h4>${esc(currentLang==='zh'?method.titleZh:method.titleEn)}</h4>
              <div class="method-subtitle">${esc(method.fullEn)}<br><span style="color:#8a96a9;">${esc(method.titleZh)}</span></div>
            </div>
          </div>
          <div class="method-badge">${esc(method.tag)}</div>
        </div>
        <p><span class="k">${currentLang==='zh'?'定义：':'Definition:'}</span> ${esc(currentLang==='zh'?method.defZh:method.defEn)}</p>
        <p><span class="k">${currentLang==='zh'?'重要性：':'Importance:'}</span> ${esc(currentLang==='zh'?method.impZh:method.impEn)}</p>
        <p><span class="k">${currentLang==='zh'?'关键要点：':'Key points:'}</span></p>
        <ul>${points}</ul>
      </div>
    </article>`;
}

function renderSections(){
  const q = searchQuery.toLowerCase();
  if(q){
    let foundAny = false;
    const html = data.map(sec => {
      const filtCards = sec.cards  ? sec.cards.filter(c  => cardText(c).includes(q))      : [];
      const filtFlow  = sec.flow   ? sec.flow.filter(s   => flowStepText(s).includes(q))  : [];
      const filtMeth  = sec.methods? sec.methods.filter(m => searchText(m).includes(q))   : [];
      if(!filtCards.length && !filtFlow.length && !filtMeth.length) return '';
      foundAny = true;
      const methodsHtml = filtMeth.length ? `<div class="method-list">${filtMeth.map(renderMethod).join('')}</div>` : '';
      return `
        <section class="section" id="${sec.id}">
          <div class="section-header"><div>
            <h3>${esc(currentLang==='zh'?(sec.sectionTitleZh||sec.titleZh):(sec.sectionTitleEn||sec.titleEn))}</h3>
          </div></div>
          ${filtCards.length ? renderCards(filtCards) : ''}
          ${renderFlow(sec, filtFlow)}
          ${methodsHtml}
        </section>`;
    }).join('');
    document.getElementById('content').innerHTML = html;
    document.getElementById('empty-state').style.display = foundAny ? 'none' : 'block';
    document.getElementById('empty-state').textContent = ui[currentLang].noResult;
  } else {
    const sec = data.find(s => s.id === activeSectionId) || data[0];
    const methodsHtml = sec.methods ? `<div class="method-list">${sec.methods.map(renderMethod).join('')}</div>` : '';
    document.getElementById('content').innerHTML = `
      <section class="section" id="${sec.id}">
        <div class="section-header">
          <div>
            <h3>${esc(currentLang==='zh'?(sec.sectionTitleZh||sec.titleZh):(sec.sectionTitleEn||sec.titleEn))}</h3>
            <p>${esc(currentLang==='zh'?(sec.sectionIntroZh||sec.introZh||''):(sec.sectionIntroEn||sec.introEn||''))}</p>
          </div>
        </div>
        ${sec.cards ? renderCards(sec.cards) : ''}
        ${renderFlow(sec)}
        ${methodsHtml}
      </section>`;
    document.getElementById('empty-state').style.display = 'none';
  }
  highlightNav();
}

function highlightNav(){
  document.querySelectorAll('.nav-item').forEach(item => item.classList.toggle('active', !searchQuery && item.dataset.target===activeSectionId));
}

function renderAll(){
  renderMeta();
  renderNav();
  renderSections();
}

function currentSectionText(){
  const el = document.getElementById(activeSectionId) || document.querySelector('.section');
  if(!el) return '';
  return el.innerText.replace(/\s+/g,' ').trim();
}

function chooseVoice(){
  const voices = speechSynthesis.getVoices();
  if(!voices.length) return null;
  const targets = currentLang==='zh' ? ['zh-CN','zh','cmn'] : ['en-US','en-GB','en'];
  return voices.find(v => targets.some(t => (v.lang||'').toLowerCase().includes(t.toLowerCase()))) || voices[0];
}

function readCurrent(){
  const text = currentSectionText();
  if(!text) return;
  speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = currentLang==='zh' ? 'zh-CN' : 'en-US';
  utter.rate = 1;
  const voice = chooseVoice();
  if(voice) utter.voice = voice;
  speechSynthesis.speak(utter);
}

document.getElementById('btn-zh').addEventListener('click', ()=>{currentLang='zh';renderAll();});
document.getElementById('btn-en').addEventListener('click', ()=>{currentLang='en';renderAll();});
document.getElementById('btn-read').addEventListener('click', readCurrent);
document.getElementById('btn-stop').addEventListener('click', ()=>speechSynthesis.cancel());
document.getElementById('btn-clear').addEventListener('click', ()=>{searchQuery='';document.getElementById('search-input').value='';renderAll();});
document.getElementById('search-input').addEventListener('input', e=>{searchQuery=e.target.value.trim();renderAll();});
renderAll();
</script>
