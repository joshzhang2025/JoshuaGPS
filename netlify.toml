# Netlify configuration for the Joshua GPS static site.
#
# The website files live at the repo root, but the repo also contains things
# that must NOT be published (node_modules, native app projects, tooling).
# So the build step copies just the web assets into ./dist and publishes that.

[build]
  publish = "dist"
  command = """
    rsync -a --delete \
      --exclude='.git' \
      --exclude='node_modules' \
      --exclude='dist' \
      --exclude='www' \
      --exclude='ios' \
      --exclude='android' \
      --exclude='.claude' \
      --exclude='server-config' \
      --exclude='*.ps1' \
      --exclude='*.py' \
      --exclude='*.cmd' \
      --exclude='*.zip' \
      --exclude='capacitor.config.json' \
      --exclude='package.json' \
      --exclude='package-lock.json' \
      ./ dist/
  """

# Never let the service worker get cached, so updates roll out immediately.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"
    Service-Worker-Allowed = "/"

# Always revalidate HTML so users get the latest app shell.
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache"

# The Supabase connection settings change rarely but should never go stale.
[[headers]]
  for = "/supabase-config.js"
  [headers.values]
    Cache-Control = "no-cache"
