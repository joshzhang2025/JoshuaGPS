<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#102954" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Joshua GPS — Offline</title>
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, #102954 0%, #1a4a9a 60%, #1f66d1 100%);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: max(24px, env(safe-area-inset-top)) 24px max(24px, env(safe-area-inset-bottom));
      text-align: center;
    }
    .offline-card {
      width: 100%;
      max-width: 380px;
    }
    .offline-icon {
      width: 84px;
      height: 84px;
      border-radius: 24px;
      margin: 0 auto 22px;
      background: rgba(255, 255, 255, 0.12);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .offline-icon svg { width: 44px; height: 44px; }
    h1 { font-size: 22px; margin: 0 0 10px; letter-spacing: 0.2px; }
    p { font-size: 15px; line-height: 1.55; margin: 0 0 26px; color: rgba(255, 255, 255, 0.82); }
    button {
      appearance: none;
      border: 0;
      width: 100%;
      padding: 15px 18px;
      border-radius: 14px;
      background: #fff;
      color: #102954;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.12s ease, opacity 0.12s ease;
    }
    button:active { transform: scale(0.98); opacity: 0.9; }
    .status {
      margin-top: 18px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.7);
      min-height: 18px;
    }
  </style>
</head>
<body>
  <div class="offline-card">
    <div class="offline-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 1l22 22" />
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55" />
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39" />
        <path d="M10.71 5.05A16 16 0 0 1 22.58 9" />
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88" />
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0" />
        <line x1="12" y1="20" x2="12.01" y2="20" />
      </svg>
    </div>
    <h1>You're offline</h1>
    <p>Joshua GPS can't reach the network right now. Check your Wi‑Fi or mobile data, then try again.</p>
    <button id="retry" type="button">Try again</button>
    <div class="status" id="status"></div>
  </div>

  <script>
    var statusEl = document.getElementById('status');

    function reload() {
      statusEl.textContent = 'Reconnecting…';
      // Bypass cache so we re-fetch the live app once the network is back.
      window.location.replace('./index.html');
    }

    document.getElementById('retry').addEventListener('click', reload);

    // Auto-recover the moment the device reports it is back online.
    window.addEventListener('online', reload);

    if (navigator.onLine) {
      statusEl.textContent = 'Connection detected — tap "Try again".';
    }
  </script>
</body>
</html>
