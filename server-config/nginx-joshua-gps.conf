server {
    listen 80;
    server_name your-domain.example.com;

    root /var/www/joshua-gps;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.json$ {
        add_header Content-Type application/json;
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    location ~* \.(html|css|js)$ {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }
}
